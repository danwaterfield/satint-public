name: Export static data to GitHub Pages

# Run daily at 11 AM NZT (22:00 UTC). Also triggered manually.
on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_DB: satint
          POSTGRES_USER: satint
          POSTGRES_PASSWORD: satint
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore database
        env:
          PGPASSWORD: satint
        run: |
          if [ -f satint_backup.dump ]; then
            pg_restore -h localhost -U satint -d satint satint_backup.dump
          else
            echo "No dump found — running migrations only"
            DJANGO_SECRET_KEY=ci-only DATABASE_URL=postgis://satint:satint@localhost:5432/satint \
              python manage.py migrate --run-syncdb
          fi

      - name: Export static JSON
        env:
          DATABASE_URL: postgis://satint:satint@localhost:5432/satint
          DJANGO_SECRET_KEY: ci-only-static-export
          DEBUG: 'false'
        run: python manage.py export_static --output-dir docs/data

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "chore: export static data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
